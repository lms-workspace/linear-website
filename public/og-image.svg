<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;800&amp;display=swap');
      .og-word { font-family: 'Geist', system-ui, sans-serif; font-weight: 800; font-size: 84px; fill: #FFFFFF; letter-spacing: -0.035em; }
      .og-word .l-accent { fill: #A78BFA; }
      .og-tag { font-family: 'Geist', system-ui, sans-serif; font-weight: 500; font-size: 28px; fill: #C4B5FD; letter-spacing: -0.01em; }
    </style>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1065"/>
      <stop offset="100%" stop-color="#0F0A1F"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="og-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>
  <g transform="translate(80, 170) scale(1.6)">
    <ellipse cx="105" cy="184" rx="78" ry="6" fill="url(#og-shadow)"/>
    <path d="M 50 30 L 86 44 L 86 148 L 50 134 Z" fill="url(#og-face)"/>
    <path d="M 50 30 L 50 134 L 32 126 L 32 22 Z" fill="#4C1D95"/>
    <path d="M 50 30 L 32 22 L 68 8 L 86 16 Z" fill="#FFFFFF"/>
    <path d="M 50 134 L 86 148 L 168 126 L 132 112 Z" fill="#4C1D95"/>
    <path d="M 86 148 L 168 126 L 168 150 L 86 172 Z" fill="url(#og-face)"/>
    <path d="M 86 148 L 86 172 L 50 158 L 50 134 Z" fill="#2E1065"/>
  </g>
  <text x="460" y="260" class="og-word"><tspan class="l-accent">L</tspan>inear</text>
  <text x="460" y="350" class="og-word">Marketing</text>
  <text x="460" y="440" class="og-word">Solutions</text>
  <text x="460" y="510" class="og-tag">Engineering for marketing. Measurable results.</text>
</svg>
